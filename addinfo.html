    <style>
      body {
        font-family: "Poppins", sans-serif;
        background-color: #0a0a0a;
        color: #e0e0e0;
      }

      .gradient-bg {
        background: linear-gradient(135deg, #0a2e1f 0%, #0f3d29 100%);
      }

      .floating {
        animation: float 6s ease-in-out infinite;
      }

      @keyframes float {
        0% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-20px);
        }
        100% {
          transform: translateY(0px);
        }
      }

      .particle {
        position: absolute;
        border-radius: 50%;
        background: rgba(46, 213, 115, 0.2);
        animation: particle-animation 15s infinite;
      }

      @keyframes particle-animation {
        0% {
          transform: translate(0, 0);
        }
        25% {
          transform: translate(100px, -50px);
        }
        50% {
          transform: translate(50px, 100px);
        }
        75% {
          transform: translate(-50px, 50px);
        }
        100% {
          transform: translate(0, 0);
        }
      }

      .glow {
        box-shadow: 0 0 15px rgba(46, 213, 115, 0.3);
      }

      .shield-icon {
        animation: shield-pulse 3s infinite;
      }

      @keyframes shield-pulse {
        0% {
          filter: drop-shadow(0 0 2px rgba(46, 213, 115, 0.4));
        }
        50% {
          filter: drop-shadow(0 0 8px rgba(46, 213, 115, 0.6));
        }
        100% {
          filter: drop-shadow(0 0 2px rgba(46, 213, 115, 0.4));
        }
      }

      .sidebar-item {
        transition: all 0.3s ease;
      }

      .sidebar-item:hover {
        background-color: rgba(46, 213, 115, 0.15);
        transform: translateX(5px);
      }

      .sidebar-item.active {
        background-color: rgba(46, 213, 115, 0.2);
        border-left: 3px solid #2ed573;
      }

      .submenu {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .submenu.open {
        max-height: 500px;
      }

      .submenu a {
        transform: translateX(0);
        transition: all 0.3s ease;
      }

      .submenu a:hover {
        transform: translateX(5px);
      }

      .btn-primary {
        background: linear-gradient(135deg, #2ed573 0%, #10ac84 100%);
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .btn-primary::after {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.2),
          transparent
        );
        transition: all 0.6s ease;
      }

      .btn-primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
      }

      .btn-primary:hover::after {
        left: 100%;
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.1);
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .btn-secondary::after {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.1),
          transparent
        );
        transition: all 0.6s ease;
      }

      .btn-secondary:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        background: rgba(255, 255, 255, 0.15);
      }

      .btn-secondary:hover::after {
        left: 100%;
      }

      .form-input {
        background-color: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.3s ease;
      }

      .form-input:focus {
        background-color: rgba(255, 255, 255, 0.12);
        border-color: #2ed573;
        box-shadow: 0 0 0 3px rgba(46, 213, 115, 0.2);
        transform: translateY(-2px);
      }

      .form-select {
        background-color: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.3s ease;
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23e0e0e0' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
        background-position: right 0.5rem center;
        background-repeat: no-repeat;
        background-size: 1.5em 1.5em;
        padding-right: 2.5rem;
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
      }

      .form-select:focus {
        background-color: rgba(255, 255, 255, 0.12);
        border-color: #2ed573;
        box-shadow: 0 0 0 3px rgba(46, 213, 115, 0.2);
        transform: translateY(-2px);
      }

      .form-checkbox {
        position: relative;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 4px;
        transition: all 0.3s ease;
        cursor: pointer;
        overflow: hidden;
      }

      .form-checkbox.checked {
        background-color: #2ed573;
        border-color: #2ed573;
      }

      .form-checkbox.checked::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 6px;
        width: 5px;
        height: 10px;
        border: solid white;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
        animation: checkbox-check 0.3s ease-out;
      }

      @keyframes checkbox-check {
        0% {
          height: 0;
        }
        50% {
          height: 10px;
        }
        100% {
          height: 10px;
        }
      }

      .form-checkbox:hover {
        border-color: #2ed573;
      }

      .header-animation {
        animation: header-slide-down 0.6s ease-out;
      }

      @keyframes header-slide-down {
        0% {
          transform: translateY(-20px);
          opacity: 0;
        }
        100% {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .content-animation {
        animation: content-fade-in 0.8s ease-out;
      }

      @keyframes content-fade-in {
        0% {
          transform: translateY(20px);
          opacity: 0;
        }
        100% {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .sidebar-animation {
        animation: sidebar-slide-in 0.7s ease-out;
      }

      @keyframes sidebar-slide-in {
        0% {
          transform: translateX(-30px);
          opacity: 0;
        }
        100% {
          transform: translateX(0);
          opacity: 1;
        }
      }

      .form-section {
        animation: form-section-fade-in 0.5s ease-out;
      }

      @keyframes form-section-fade-in {
        0% {
          transform: translateY(10px);
          opacity: 0;
        }
        100% {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .ripple {
        position: absolute;
        border-radius: 50%;
        background: rgba(46, 213, 115, 0.4);
        transform: scale(0);
        animation: ripple 0.8s linear;
      }

      @keyframes ripple {
        to {
          transform: scale(2.5);
          opacity: 0;
        }
      }

      .hover-glow:hover {
        box-shadow: 0 0 15px rgba(46, 213, 115, 0.5);
      }

      .avatar-preview {
        position: relative;
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background-color: rgba(255, 255, 255, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        transition: all 0.3s ease;
        cursor: pointer;
      }

      .avatar-preview:hover {
        transform: scale(1.05);
        box-shadow: 0 0 15px rgba(46, 213, 115, 0.5);
      }

      .avatar-preview::after {
        content: "Upload";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .avatar-preview:hover::after {
        opacity: 1;
      }

      .avatar-initials {
        font-size: 36px;
        font-weight: 600;
        color: #2ed573;
      }

      .form-group {
        position: relative;
        margin-bottom: 1.5rem;
      }

      .form-group label {
        position: absolute;
        top: 0.75rem;
        left: 0.75rem;
        color: rgba(255, 255, 255, 0.6);
        pointer-events: none;
        transition: all 0.3s ease;
      }

      .form-group input:focus + label,
      .form-group input:not(:placeholder-shown) + label {
        top: -0.5rem;
        left: 0.5rem;
        font-size: 0.75rem;
        padding: 0 0.25rem;
        background-color: #0f172a;
        color: #2ed573;
      }

      .form-group input {
        padding-top: 1rem;
        padding-bottom: 0.5rem;
      }

      .form-tab {
        position: relative;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .form-tab::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        width: 0;
        height: 2px;
        background: #2ed573;
        transition: width 0.3s ease;
      }

      .form-tab.active {
        color: #2ed573;
      }

      .form-tab.active::after {
        width: 100%;
      }

      .form-tab:hover::after {
        width: 100%;
      }

      .tab-content {
        display: none;
        animation: tab-fade-in 0.5s ease-out;
      }

      .tab-content.active {
        display: block;
      }

      @keyframes tab-fade-in {
        0% {
          opacity: 0;
          transform: translateY(10px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .permission-toggle {
        position: relative;
        width: 50px;
        height: 24px;
        border-radius: 12px;
        background-color: rgba(255, 255, 255, 0.1);
        transition: all 0.3s ease;
        cursor: pointer;
      }

      .permission-toggle::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background-color: white;
        transition: all 0.3s ease;
      }

      .permission-toggle.active {
        background-color: #2ed573;
      }

      .permission-toggle.active::after {
        left: 28px;
      }
    </style>
  </head>

    <script>
      // Create animated background effect
      function createParticles() {
        const container = document.querySelector(".fixed");
        for (let i = 0; i < 20; i++) {
          const size = Math.random() * 5 + 2;
          const particle = document.createElement("div");
          particle.classList.add("particle");
          particle.style.width = `${size}px`;
          particle.style.height = `${size}px`;
          particle.style.top = `${Math.random() * 100}%`;
          particle.style.left = `${Math.random() * 100}%`;
          particle.style.opacity = Math.random() * 0.5 + 0.1;
          particle.style.animationDuration = `${Math.random() * 20 + 10}s`;
          particle.style.animationDelay = `${Math.random() * 5}s`;
          container.appendChild(particle);
        }
      }

      // Toggle submenu functionality with animation
      document
        .getElementById("user-management-menu")
        .addEventListener("click", function () {
          const submenu = document.getElementById("user-management-submenu");
          const arrow = document.getElementById("user-management-arrow");
          submenu.classList.toggle("open");
          arrow.classList.toggle("rotate-180");
        });

      document
        .getElementById("role-assignment-menu")
        .addEventListener("click", function () {
          const submenu = document.getElementById("role-assignment-submenu");
          const arrow = document.getElementById("role-assignment-arrow");
          submenu.classList.toggle("open");
          arrow.classList.toggle("rotate-180");
        });

      // getting values from the form

      document
        .getElementById("save-user-btn-bottom")
        .addEventListener("click", function (e) {
          e.preventDefault();

          const data = {
            first_name: document.getElementById("first-name").value,
            last_name: document.getElementById("last-name").value,
            email: document.getElementById("email").value,
            phone_number: document.getElementById("phone").value,
            department: document.getElementById("department").value,
            username: document.getElementById("username").value,
            password: document.getElementById("password").value,
            confirm_password: document.getElementById("confirm-password").value,
            status: document.getElementById("status").value,
            role: document.getElementById("role").value,
          };

          // Optional: Basic password match check
          if (data.password !== data.confirm_password) {
            alert("Passwords do not match!");
            return;
          }

          fetch("http://127.0.0.1:8000/api/register/", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(data),
          })
            .then((response) => response.json())
            .then((response) => {
              if (response.message) {
                alert(response.message);
              } else {
                alert("Registration failed.");
              }
            })
            .catch((error) => {
              console.error("Error:", error);
              alert("Something went wrong. Check console.");
            });
        });

      // Initialize custom checkboxes
      function initCheckboxes() {
        document.querySelectorAll(".form-checkbox").forEach((checkbox) => {
          checkbox.addEventListener("click", function () {
            this.classList.toggle("checked");
          });
        });
      }

      // Initialize permission toggles
      function initPermissionToggles() {
        document.querySelectorAll(".permission-toggle").forEach((toggle) => {
          toggle.addEventListener("click", function () {
            this.classList.toggle("active");
          });
        });
      }

      // Create ripple effect
      function createRippleEffect(event) {
        const button = event.currentTarget;
        const ripple = document.createElement("span");

        const rect = button.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);

        const x = event.clientX - rect.left - size / 2;
        const y = event.clientY - rect.top - size / 2;

        ripple.className = "ripple";
        ripple.style.width = ripple.style.height = `${size}px`;
        ripple.style.left = `${x}px`;
        ripple.style.top = `${y}px`;

        button.appendChild(ripple);

        setTimeout(() => {
          ripple.remove();
        }, 800);
      }

      // Add ripple effect to buttons
      document
        .getElementById("cancel-btn-bottom")
        .addEventListener("click", createRippleEffect);
      document
        .getElementById("save-user-btn-bottom")
        .addEventListener("click", createRippleEffect);

      // Form validation and submission

      document
        .getElementById("save-user-btn-bottom")
        .addEventListener("click", function (e) {
          createRippleEffect(e);

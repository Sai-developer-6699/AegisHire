<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add User</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="adduser.css" />
  </head>
  <body>
    <!--Background Particles-->
    <div class="fixed inset-0 z-0 overflow-hidden">
      <div class="particle w-4 h-4 top-[10%] left-[20%]"></div>
      <div class="particle w-4 h-4 top-[30%] left-[40%]"></div>
      <div class="particle w-4 h-4 top-[50%] left-[60%]"></div>
      <div class="particle w-4 h-4 top-[70%] left-[80%]"></div>
      <div class="particle w-4 h-4 top-[20%] left-[30%]"></div>
      <div class="particle w-4 h-4 top-[40%] left-[50%]"></div>
      <div class="particle w-4 h-4 top-[60%] left-[70%]"></div>
    </div>
    <div class="min-h-screen flex relative z-10">
      <!-- Sidebar -->
      <div
        class="w-64 bg-gray-900 border-r border-gray-800 flex flex-col sidebar-animation"
      >
        <!-- Logo -->
        <div class="p-4 border-b border-gray-800">
          <div class="flex items-center">
            <svg
              class="w-8 h-8 text-green-400 shield-icon"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M12 22C12 22 20 18 20 12V5L12 2L4 5V12C4 18 12 22 12 22Z"
                stroke="currentColor"
                stroke-width="3"
              />
              <path
                d="M9 12L11 14L15 10"
                stroke="currentColor"
                stroke-width="3"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <h1 class="text-xl font-bold ml-2 text-white">SafeNet</h1>
          </div>
        </div>
        <!-- Navigation -->
        <div class="flex-1 overflow-y-auto py-4">
            <nav class="px-2 space-y-1">
                <div class="sidebar-item px-3 py-3 rounded-md">
                    <div class="flex items-center justify-between cursor-pointer">
                        <div class="flex items-center">
                            <svg class="w-5 h-5 text-green-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z" />
                            </svg>
                            <span class="ml-3 text-sm font-medium text-white">Dashboard</span>
                        </div>
                    </div>
                </div>

                <div class="sidebar-item px-3 py-3 rounded-md">
                    <div class="flex items-center justify-between cursor-pointer" id="user-management-menu">
                        <div class="flex items-center">
                            <svg class="w-5 h-5 text-green-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.973 5.973 0 004 15v3H1v-3a3 3 0 013.75-2.906z" />
                            </svg>
                            <span class="ml-3 text-sm font-medium text-white">User Management</span>
                        </div>
                        <svg class="w-4 h-4 text-gray-400 transform transition-transform " id="user-management-arrow">
                            <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" />
                        </svg>
                    </div>
                    <div class="submenu open mt-1 pl-6 space-y-1" id="user-management-submenu">
                        <a href="#" class="block py-2 px-3 text-sm text-green-400 bg-gray-800 bg-opacity-50 rounded-md">Add New User</a>
                        <a href="#" class="block py-2 px-3 text-sm text-gray-300 rounded-md hover:bg-gray-800">User Group</a>
                    </div>
                </div>

                <div class="sidebar-item px-3 py-3 rounded-md">
                    <div class="flex items-center justify-between cursor-pointer" id="role-assignment-menu">
                        <div class="flex items-center">
                            <svg class="w-5 h-5 text-green-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2 0 6.627-5.373 12-12 12-4.26 0-7.943-2.204-10.044-5.522A1.002 1.002 0 012.015 11h3.985a1 1 0 01.949.668 7.953 7.953 0 001.59 2.088 8.028 8.028 0 004.464 2.088 8.028 8.028 0 005.419-2.088c.849-1.077 1.34-2.5 1.493-4.041H12a1 1 0 01-1-1V4a1 1 0 011-1h1.532A11.99 11.99 0 0010 1.944a11.954 11.954 0 00-7.834 3.055z" />
                            </svg>
                            <span class="ml-3 text-sm font-medium text-white">Role Assignment</span>
                        </div>
                        <svg class="w-4 h-4 text-gray-400 transform transition-transform" id="role-assignment-arrow">
                            <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" />
                        </svg>
                    </div>
                    <div class="submenu open mt-1 pl-6 space-y-1" id="role-assignment-submenu">
                        <a href="#" class="block py-2 px-3 text-sm text-gray-300 rounded-md hover:bg-gray-800">Manage Role</a>
                        <a href="#" class="block py-2 px-3 text-sm text-gray-300 rounded-md hover:bg-gray-800">Assign Role</a>
                        <a href="#" class="block py-2 px-3 text-sm text-gray-300 rounded-md hover:bg-gray-800">Role Permission</a>
                    </div>
                </div>
                <div class="sidebar-item px-3 py-3 rounded-md">
                    <div class="flex items-center">
                        <svg class="w-5 h-5 text-green-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.06 2.042-.947 2.287-1.561.38-1.561 2.6 0 2.98.998.243 1.487 1.402.947 2.287-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.38 1.56 2.6 1.56 2.98 0a1.532 1.532 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.532 1.532 0 01.947-2.287c1.561-.38 1.561-2.6 0-2.98a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" />
                        </svg>
                        <span class="ml-3 text-sm font-medium text-white">Settings</span>
                    </div>
                </div>
            </nav>
        </div>
        
      </div>
    
<script>
  // Toggle for User Management submenu
  document.getElementById("user-management-menu").addEventListener("click", function () {
    const submenu = document.getElementById("user-management-submenu");
    const arrow = document.getElementById("user-management-arrow");
    
    submenu.classList.toggle("hidden");
    arrow.classList.toggle("rotate-180");
  });

  // Toggle for Role Assignment submenu
  document.getElementById("role-assignment-menu").addEventListener("click", function () {
    const submenu = document.getElementById("role-assignment-submenu");
    const arrow = document.getElementById("role-assignment-arrow");
    
    submenu.classList.toggle("hidden");
    arrow.classList.toggle("rotate-180");
  });
</script>

</body>
</html>

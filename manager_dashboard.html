<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0a0a0a;
            color: #e0e0e0;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #0a2e1f 0%, #0f3d29 100%);
        }
        
        .floating {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(46, 213, 115, 0.2);
            animation: particle-animation 15s infinite;
        }
        
        @keyframes particle-animation {
            0% { transform: translate(0, 0); }
            25% { transform: translate(100px, -50px); }
            50% { transform: translate(50px, 100px); }
            75% { transform: translate(-50px, 50px); }
            100% { transform: translate(0, 0); }
        }
        
        .glow {
            box-shadow: 0 0 15px rgba(46, 213, 115, 0.3);
        }
        
        .shield-icon {
            animation: shield-pulse 3s infinite;
        }
        
        @keyframes shield-pulse {
            0% { filter: drop-shadow(0 0 2px rgba(46, 213, 115, 0.4)); }
            50% { filter: drop-shadow(0 0 8px rgba(46, 213, 115, 0.6)); }
            100% { filter: drop-shadow(0 0 2px rgba(46, 213, 115, 0.4)); }
        }
        
        .sidebar-item {
            transition: all 0.3s ease;
        }
        
        .sidebar-item:hover {
            background-color: rgba(46, 213, 115, 0.15);
            transform: translateX(5px);
        }
        
        .sidebar-item.active {
            background-color: rgba(46, 213, 115, 0.2);
            border-left: 3px solid #2ed573;
        }
        
        .submenu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .submenu.open {
            max-height: 500px;
        }
        
        .submenu a {
            transform: translateX(0);
            transition: all 0.3s ease;
        }
        
        .submenu a:hover {
            transform: translateX(5px);
        }
        
        .hover-glow:hover {
            box-shadow: 0 0 15px rgba(46, 213, 115, 0.5);
        }

        .header-animation {
            animation: header-slide-down 0.6s ease-out;
        }
        
        @keyframes header-slide-down {
            0% { transform: translateY(-20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        
        .sidebar-animation {
            animation: sidebar-slide-in 0.7s ease-out;
        }
        
        @keyframes sidebar-slide-in {
            0% { transform: translateX(-30px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
        
        .pulse-effect {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(46, 213, 115, 0.4);
            transform: scale(0);
            animation: ripple 0.8s linear;
        }
        
        @keyframes ripple {
            to {
                transform: scale(2.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="fixed inset-0 z-0 overflow-hidden">
        <div class="particle w-4 h-4 top-[10%] left-[10%]"></div>
        <div class="particle w-6 h-6 top-[20%] left-[80%]"></div>
        <div class="particle w-3 h-3 top-[60%] left-[5%]"></div>
        <div class="particle w-5 h-5 top-[70%] left-[70%]"></div>
        <div class="particle w-4 h-4 top-[40%] left-[30%]"></div>
        <div class="particle w-2 h-2 top-[30%] left-[50%]"></div>
        <div class="particle w-3 h-3 top-[80%] left-[40%]"></div>
    </div>

    <div class="min-h-screen flex relative z-10">
        <div class="w-64 bg-gray-900 border-r border-gray-800 flex flex-col sidebar-animation">
            <div class="p-4 border-b border-gray-800">
                <div class="flex items-center">
                    <svg class="w-8 h-8 text-green-400 shield-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 22C12 22 20 18 20 12V5L12 2L4 5V12C4 18 12 22 12 22Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M9 12L11 14L15 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <h1 class="text-xl font-bold ml-3 text-white">SafeNet</h1>
                </div>
            </div>
            
            <div class="flex-1 overflow-y-auto py-4">
                <nav class="px-2 space-y-1">
                    <div class="sidebar-item active px-3 py-3 rounded-md">
                        <div class="flex items-center">
                            <svg class="w-5 h-5 text-green-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z" />
                            </svg>
                            <span class="ml-3 text-sm font-medium text-white"><a href="dashboard.html">Dashboard</a></span>
                        </div>
                    </div>
                    
                    <div class="sidebar-item px-3 py-3 rounded-md">
                        <div class="flex items-center justify-between cursor-pointer" id="user-management-menu">
                            <div class="flex items-center">
                                <svg class="w-5 h-5 text-green-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                                    <path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.973 5.973 0 004 15v3H1v-3a3 3 0 013.75-2.906z" />
                                </svg>
                                <span class="ml-3 text-sm font-medium text-white">Shortlisted Candidates</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="sidebar-item px-3 py-3 rounded-md">
                        <div class="flex items-center justify-between cursor-pointer" id="role-assignment-menu">
                            <div class="flex items-center">
                                <svg class="w-5 h-5 text-green-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                                </svg>
                                <span class="ml-3 text-sm font-medium text-white">Interview Calender</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="sidebar-item px-3 py-3 rounded-md">
                        <div class="flex items-center">
                            <svg class="w-5 h-5 text-green-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path fill="currentColor" d="M160 80c0-26.5 21.5-48 48-48l32 0c26.5 0 48 21.5 48 48l0 352c0 26.5-21.5 48-48 48l-32 0c-26.5 0-48-21.5-48-48l0-352zM0 272c0-26.5 21.5-48 48-48l32 0c26.5 0 48 21.5 48 48l0 160c0 26.5-21.5 48-48 48l-32 0c-26.5 0-48-21.5-48-48L0 272zM368 96l32 0c26.5 0 48 21.5 48 48l0 288c0 26.5-21.5 48-48 48l-32 0c-26.5 0-48-21.5-48-48l0-288c0-26.5 21.5-48 48-48z"/></svg>
                            <span class="ml-3 text-sm font-medium text-white">Candidate Performance</span>
                        </div>
                    </div>
                </nav>
            </div>
            
            <div class="p-4 border-t border-gray-800">
                <div class="flex items-center hover-glow rounded-lg p-2 transition-all duration-300 cursor-pointer">
                    <div class="bg-gray-800 rounded-full w-8 h-8 flex items-center justify-center pulse-effect">
                        <svg class="w-5 h-5 text-green-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
                        </svg>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm font-medium text-white">Manager</p>
                        <p class="text-xs text-gray-400">System Manager</p>
                    </div>
                </div>
            </div>
        </div>
        </div>


<script>
    // Toggle for User Management submenu - Kept as the menu item is there, even if submenu isn't open
    document.getElementById("user-management-menu").addEventListener("click", function () {
        const submenu = document.getElementById("user-management-submenu");
        // Check if submenu exists before trying to access properties
        if (submenu) {
            submenu.classList.toggle("hidden");
        }
        const arrow = this.querySelector('svg:last-child'); // Assuming arrow is the last svg in the div
        if (arrow) {
            arrow.classList.toggle("rotate-180");
        }
    });

    // Toggle for Role Assignment submenu - Kept as the menu item is there, even if submenu isn't open
    document.getElementById("role-assignment-menu").addEventListener("click", function () {
        const submenu = document.getElementById("role-assignment-submenu");
        // Check if submenu exists before trying to access properties
        if (submenu) {
            submenu.classList.toggle("hidden");
        }
        const arrow = this.querySelector('svg:last-child'); // Assuming arrow is the last svg in the div
        if (arrow) {
            arrow.classList.toggle("rotate-180");
        }
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <script src="../config/config.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SafeNet Manager - Candidate Performance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: "Poppins", sans-serif; background-color: #0a1727; }
    .sidebar-item { transition: all 0.3s ease; }
    .sidebar-item:hover { background-color: rgba(46, 213, 115, 0.15); transform: translateX(5px); }
    .sidebar-item.active { background-color: rgba(46, 213, 115, 0.2); border-left: 3px solid #2ed573; }
    .btn-primary { background: linear-gradient(135deg, #2ed573 0%, #10ac84 100%); transition: all 0.3s ease; position: relative; overflow: hidden; }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    .btn-secondary { background: rgba(255,255,255,0.1); transition: all 0.3s ease; position: relative; overflow: hidden; }
    .form-input { transition: all 0.3s ease; }
    .form-input:focus { box-shadow: 0 0 0 2px rgba(46,213,115,0.4); transform: translateY(-2px); }
    .candidate-row:hover { background-color: rgba(46,213,115,0.1); border-left: 3px solid #2ed573; }
    .modal-bg { background: rgba(0,0,0,0.5); }
  </style>
</head>
<body class="bg-darkblue-950 text-white min-h-screen flex">
  <!-- Sidebar -->
  <div class="w-64 bg-darkblue-900 min-h-screen shadow-lg border-r border-gray-800 fixed z-10">
    <div class="p-6 border-b border-gray-800 flex items-center space-x-3">
      <div class="w-10 h-10 rounded-lg bg-accent-green bg-opacity-20 flex items-center justify-center">
        <svg class="w-6 h-6 text-accent-green" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
      </div>
      <h1 class="text-xl font-semibold text-white">SafeNet</h1>
    </div>
    <nav class="mt-8 px-4">
      <div class="space-y-2">
        <a href="./manager_dashboard.html" class="sidebar-item flex items-center px-4 py-3 text-gray-300 rounded-lg"><span>Dashboard</span></a>
        <a href="./manager_job_creation.html" class="sidebar-item flex items-center px-4 py-3 text-gray-300 rounded-lg"><span>Job Creation</span></a>
        <a href="./manager_shortlist.html" class="sidebar-item flex items-center px-4 py-3 text-gray-300 rounded-lg"><span>Shortlist Candidate</span></a>
        <a href="./manager_candidate_performance.html" class="sidebar-item active flex items-center px-4 py-3 text-white rounded-lg"><span>Candidate Performance</span></a>
      </div>
    </nav>
    <div class="absolute bottom-0 left-0 w-64 p-4 border-t border-gray-800">
      <div class="flex items-center">
        <div class="w-10 h-10 rounded-full bg-darkblue-700 flex items-center justify-center text-accent-green font-semibold">MG</div>
        <div class="ml-3">
          <p class="text-sm font-medium text-white">Mark Green</p>
          <p class="text-xs text-gray-400">Manager</p>
        </div>
      </div>
    </div>
  </div>
  <!-- Main Content -->
  <div class="ml-64 flex-1">
    <header class="bg-darkblue-900 shadow-md sticky top-0 z-10">
      <div class="px-6 py-4 flex items-center justify-between">
        <h2 class="text-xl font-semibold text-white">Candidate Performance</h2>
      </div>
    </header>
    <main class="p-6">
      <div class="mb-8">
        <h1 class="text-3xl font-bold text-accent-green">Candidate Performance</h1>
        <p class="text-gray-400 mt-2">View and score candidates for your job requirements</p>
      </div>
      <!-- Requirement Selection -->
      <div class="bg-darkblue-800 rounded-xl shadow-lg p-6 mb-8">
        <h3 class="text-2xl font-semibold text-accent-green mb-4">Select Job Requirement</h3>
        <select id="requirementSelect" class="form-input w-full px-4 py-2 rounded-lg bg-darkblue-900 border border-gray-700 text-white mb-4"></select>
      </div>
      <!-- Candidates List -->
      <div class="bg-darkblue-800 rounded-xl shadow-lg p-6 mb-8">
        <h3 class="text-2xl font-semibold text-accent-green mb-4">Candidates</h3>
        <div id="candidatesContainer" class="divide-y divide-darkblue-700"></div>
      </div>
    </main>
  </div>
  <!-- Modal for Scoring Exam -->
  <div id="scoreModal" class="fixed inset-0 flex items-center justify-center z-50 hidden modal-bg">
    <div class="bg-darkblue-900 p-8 rounded-xl shadow-xl w-full max-w-2xl">
      <h2 class="text-xl font-semibold text-accent-green mb-4">Score Exam Answers</h2>
      <form id="scoreForm" class="space-y-4">
        <input type="hidden" id="modalSessionId" />
        <div id="answersContainer"></div>
        <div class="flex justify-end space-x-2 mt-4">
          <button type="button" id="closeModalBtn" class="btn-secondary px-4 py-2 rounded-lg text-gray-300 hover:text-white">Cancel</button>
          <button type="submit" class="btn-primary px-6 py-2 text-white font-medium rounded-lg shadow-md">Save Scores</button>
        </div>
      </form>
    </div>
  </div>
  <script>
    // Load requirements for dropdown
    async function loadRequirements() {
      const select = document.getElementById('requirementSelect');
      select.innerHTML = '<option>Loading...</option>';
      try {
        const res = await fetch(apiConfig.getURL("api/list_job_requirements/"), { credentials: 'include' });
        const data = await res.json();
        select.innerHTML = '';
        data.forEach(req => {
          const opt = document.createElement('option');
          opt.value = req.requirement_id;
          opt.textContent = `${req.position} (by ${req.created_by})`;
          select.appendChild(opt);
        });
        if (data.length) loadCandidates(data[0].requirement_id);
      } catch (err) {
        select.innerHTML = '<option>Error loading requirements</option>';
      }
    }
    // Load candidates for a requirement
    async function loadCandidates(requirementId) {
      const container = document.getElementById('candidatesContainer');
      container.innerHTML = '<div class="text-gray-400">Loading...</div>';
      try {
        const res = await fetch(`apiConfig.getURL("api/")manager/performance/${requirementId}/`, { credentials: 'include' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to fetch');
        if (!data.candidates.length) {
          container.innerHTML = '<div class="text-gray-400">No candidates for this requirement.</div>';
          return;
        }
        container.innerHTML = '';
        data.candidates.forEach(candidate => {
          const row = document.createElement('div');
          row.className = 'candidate-row px-4 py-4 flex items-center justify-between';
          row.innerHTML = `
            <div>
              <div class="font-semibold text-white">${candidate.name}</div>
              <div class="text-gray-400 text-sm">${candidate.email}</div>
              <div class="text-xs text-gray-400 mt-1">Status: <span class="text-accent-green">${candidate.status}</span> | Exam Score: <span class="text-accent-green">${candidate.exam_score ?? '-'}</span></div>
            </div>
            <button class="btn-primary px-4 py-2 rounded-lg text-white font-medium" onclick="openScoreModal(${candidate.map_id}, '${candidate.name.replace(/'/g, "\'")}')">Score</button>
          `;
          container.appendChild(row);
        });
      } catch (err) {
        container.innerHTML = `<div class="text-red-400">${err.message}</div>`;
      }
    }
    // Modal logic for scoring
    async function openScoreModal(mapId, candidateName) {
      document.getElementById('scoreModal').classList.remove('hidden');
      const answersContainer = document.getElementById('answersContainer');
      answersContainer.innerHTML = '<div class="text-gray-400">Loading answers...</div>';
      try {
        const res = await fetch(`apiConfig.getURL("api/")manager/exam-answers/${mapId}/`, { credentials: 'include' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to fetch answers');
        document.getElementById('modalSessionId').value = data.session_id;
        answersContainer.innerHTML = '';
        data.answers.forEach(ans => {
          const div = document.createElement('div');
          div.className = 'mb-4 p-4 rounded-lg bg-darkblue-800 border border-darkblue-700';
          div.innerHTML = `
            <div class="font-semibold text-white mb-1">Q: ${ans.question_text}</div>
            <div class="text-gray-400 mb-2">Type: ${ans.question_type}</div>
            <div class="mb-2"><span class="text-gray-300">Answer:</span> <span class="text-white">${ans.answer_text}</span></div>
            <div class="flex items-center space-x-4">
              <label class="text-sm text-gray-300">Score:</label>
              <input type="number" min="0" max="100" step="0.01" class="form-input px-2 py-1 rounded bg-darkblue-900 border border-gray-700 text-white w-24" value="${ans.score_awarded ?? ''}" data-answer-id="${ans.answer_id}" />
              <label class="ml-4 text-sm text-gray-300">Correct?</label>
              <input type="checkbox" class="ml-2" ${ans.is_correct ? 'checked' : ''} data-correct-id="${ans.answer_id}" />
            </div>
          `;
          answersContainer.appendChild(div);
        });
      } catch (err) {
        answersContainer.innerHTML = `<div class="text-red-400">${err.message}</div>`;
      }
    }
    document.getElementById('closeModalBtn').onclick = function() {
      document.getElementById('scoreModal').classList.add('hidden');
    };
    document.getElementById('scoreForm').onsubmit = async function(e) {
      e.preventDefault();
      const sessionId = document.getElementById('modalSessionId').value;
      const answerInputs = document.querySelectorAll('input[data-answer-id]');
      const correctInputs = document.querySelectorAll('input[data-correct-id]');
      const answers = Array.from(answerInputs).map(input => {
        const answerId = input.getAttribute('data-answer-id');
        const score = input.value;
        const correct = Array.from(correctInputs).find(c => c.getAttribute('data-correct-id') === answerId)?.checked;
        return { answer_id: answerId, score_awarded: score, is_correct: correct };
      });
      try {
        const res = await fetch(apiConfig.getURL("api/manager/update-exam-scores/"), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ session_id: sessionId, answers })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to update scores');
        document.getElementById('scoreModal').classList.add('hidden');
        loadCandidates(document.getElementById('requirementSelect').value);
        alert('Scores updated successfully!');
      } catch (err) {
        alert('Error: ' + err.message);
      }
    };
    document.getElementById('requirementSelect').onchange = function() {
      loadCandidates(this.value);
    };
    // Initial load
    loadRequirements();
  </script>
</body>
</html>

<head>

    <link hred="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkblue: {
                            950: "#0a1727",
                            900: "#0d1b2a",
                            800: "#112240",
                            700: "#1b2c3f",
                        },
                        accent: {
                            green: "#2ed573",
                        },
                    },
                    boxShadow: {
                        glow: "0 0 15px rgba(46, 213, 115, 0.3)",
                        "glow-lg": "0 0 25px rgba(46, 213, 115, 0.4)",
                    },
                    keyframes: {
                        float: {
                            "0%, 100%": { transform: "translateY(0)" },
                            "50%": { transform: "translateY(-10px)" },
                        },
                        pulse: {
                            "0%, 100%": { opacity: 1 },
                            "50%": { opacity: 0.7 },
                        },
                        headerSlideDown: {
                            "0%": { transform: "translateY(-20px)", opacity: 0 },
                            "100%": { transform: "translateY(0)", opacity: 1 },
                        },
                        sidebarSlideIn: {
                            "0%": { transform: "translateX(-20px)", opacity: 0 },
                            "100%": { transform: "translateX(0)", opacity: 1 },
                        },
                        contentFadeIn: {
                            "0%": { opacity: 0 },
                            "100%": { opacity: 1 },
                        },
                        cardSlideUp: {
                            "0%": { transform: "translateY(20px)", opacity: 0 },
                            "100%": { transform: "translateY(0)", opacity: 1 },
                        },
                    },
                    animation: {
                        float: "float 3s ease-in-out infinite",
                        pulse: "pulse 2s ease-in-out infinite",
                        headerSlideDown: "headerSlideDown 0.5s ease-out forwards",
                        sidebarSlideIn: "sidebarSlideIn 0.5s ease-out forwards",
                        contentFadeIn: "contentFadeIn 0.8s ease-out forwards",
                        cardSlideUp: "cardSlideUp 0.5s ease-out forwards",
                    },
                },
            },
        };
    </script>
    <style>
        body {
            font-family: "Poppins", sans-serif;
            background-color: #0a1727;
        }

        .floating {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-20px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(46, 213, 115, 0.2);
            animation: particle-animation 15s infinite;
        }

        @keyframes particle-animation {
            0% {
                transform: translate(0, 0);
            }

            25% {
                transform: translate(100px, -50px);
            }

            50% {
                transform: translate(50px, 100px);
            }

            75% {
                transform: translate(-50px, 50px);
            }

            100% {
                transform: translate(0, 0);
            }
        }

        .glow {
            box-shadow: 0 0 15px rgba(46, 213, 115, 0.3);
        }

        .shield-icon {
            animation: shield-pulse 3s infinite;
        }

        @keyframes shield-pulse {
            0% {
                filter: drop-shadow(0 0 2px rgba(46, 213, 115, 0.4));
            }

            50% {
                filter: drop-shadow(0 0 8px rgba(46, 213, 115, 0.6));
            }

            100% {
                filter: drop-shadow(0 0 2px rgba(46, 213, 115, 0.4));
            }
        }


        .sidebar-item {
            transition: all 0.3s ease;
        }

        .sidebar-item:hover {
            background-color: rgba(46, 213, 115, 0.15);
            transform: translateX(5px);
        }

        .sidebar-item.active {
            background-color: rgba(46, 213, 115, 0.2);
            border-left: 3px solid #2ed573;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #2ed573;
            box-shadow: 0 0 0 1px #2ed573;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2ed573 0%, #10ac84 100%);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, 0.2),
                    transparent);
            transition: all 0.6s ease;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-primary:hover::after {
            left: 100%;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-secondary::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, 0.2),
                    transparent);
            transition: all 0.6s ease;
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-secondary:hover::after {
            left: 100%;
        }

        .skill-pill {
            transition: all 0.2s ease;
        }

        .skill-pill:hover {
            transform: translateY(-2px);
        }

        .skill-pill.active {
            background-color: #2ed573;
            color: #0d1b2a;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0a1727;
        }

        ::-webkit-scrollbar-thumb {
            background: #2ed573;
            border-radius: 4px;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .dashboard-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }

            .sidebar-content {
                flex-direction: row;
                overflow-x: auto;
                padding: 1rem;
            }

            .sidebar-item {
                border-left: none;
                border-bottom: 2px solid transparent;
                padding: 0.5rem 1rem;
                margin-right: 1rem;
            }

            .sidebar-item.active {
                border-left: none;
                border-bottom: 2px solid #2ed573;
            }

            .particle {
                position: absolute;
                border-radius: 50%;
                background: rgba(46, 213, 115, 0.1);
                pointer-events: none;
                z-index: 0;
            }

            .shield-pulse {
                animation: pulse 2s infinite;
            }

            .delay-100 {
                animation-delay: 0.1s;
            }

            .delay-200 {
                animation-delay: 0.2s;
            }

            .delay-300 {
                animation-delay: 0.3s;
            }

            .delay-400 {
                animation-delay: 0.4s;
            }

            .delay-500 {
                animation-delay: 0.5s;
            }



            @keyframes checkmark {
                0% {
                    transform: translate(-50%, -50%) scale(0);
                }

                50% {
                    transform: translate(-50%, -50%) scale(1.2);
                }

                100% {
                    transform: translate(-50%, -50%) scale(1);
                }
            }


            /* Profile dropdown animation */
            .profile-dropdown {
                transform: translateY(10px);
                opacity: 0;
                visibility: hidden;
                transition: all 0.3s ease;
            }

            .profile-dropdown.open {
                transform: translateY(0);
                opacity: 1;
                visibility: visible;
            }

            /* Notification animation */
            @keyframes slideIn {
                0% {
                    transform: translateX(100%);
                    opacity: 0;
                }

                100% {
                    transform: translateX(0);
                    opacity: 1;
                }
            }

            @keyframes slideOut {
                0% {
                    transform: translateX(0);
                    opacity: 1;
                }

                100% {
                    transform: translateX(100%);
                    opacity: 0;
                }
            }

            .notification {
                animation: slideIn 0.3s forwards;
            }

            .notification.hide {
                animation: slideOut 0.3s forwards;
            }
        }
    </style>
    <script src="../config/config.js"></script>
</head>

    <script>
        function showError(message) {
            var errorDiv = document.getElementById('error-message');
            if (errorDiv) {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
                setTimeout(function() { errorDiv.style.display = 'none'; }, 5000);
            }
            var dialog = document.getElementById('error-dialog');
            var msgSpan = document.getElementById('error-dialog-message');
            if (dialog && msgSpan) {
                msgSpan.textContent = message;
                dialog.style.display = 'flex';
            }
        }
        function closeErrorDialog() {
            var dialog = document.getElementById('error-dialog');
            if (dialog) dialog.style.display = 'none';
        }
        document.getElementById("logout-btn").addEventListener("click", async function () {
            try {
                const res = await fetch(`${apiConfig.getURL("api/logout/")}`, {
                    method: "POST",
                    credentials: "include",
                    headers: {
                        "Content-Type": "application/json"
                    }
                });

                let data = {};
                try {
                    data = await res.json(); // attempt to parse JSON
                } catch (err) {
                    console.warn("No JSON response received", err);
                }

                console.log("Logout response:", data);

                if (res.ok) {
                    window.location.href = data.redirect || "/login.html";
                } else {
                    showError("Logout failed: " + (data.message || "Unknown error"));
                }

            } catch (error) {
                console.error("Logout error:", error);
                showError("Network error during logout.");
            }
        });
    </script>
    <script>
function showSuccess(message) {
  const container = document.getElementById('notificationContainer');
  if (!container) return;
  const notif = document.createElement('div');
  notif.textContent = message;
  notif.style.background = '#22c55e'; // Tailwind green-500
  notif.style.color = '#fff';
  notif.style.padding = '14px 24px';
  notif.style.borderRadius = '8px';
  notif.style.boxShadow = '0 2px 8px rgba(0,0,0,0.12)';
  notif.style.fontWeight = 'bold';
  notif.style.fontSize = '1rem';
  notif.style.display = 'flex';
  notif.style.alignItems = 'center';
  notif.style.justifyContent = 'space-between';
  notif.style.gap = '16px';
  const closeBtn = document.createElement('button');
  closeBtn.textContent = '×';
  closeBtn.style.background = 'transparent';
  closeBtn.style.border = 'none';
  closeBtn.style.color = '#fff';
  closeBtn.style.fontSize = '1.2em';
  closeBtn.style.cursor = 'pointer';
  closeBtn.onclick = () => container.removeChild(notif);
  notif.appendChild(closeBtn);
  container.appendChild(notif);
  setTimeout(() => {
    if (container.contains(notif)) container.removeChild(notif);
  }, 3000);
}
</script>

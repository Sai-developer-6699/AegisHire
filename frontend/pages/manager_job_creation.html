<html lang="en">

<head>
    <meta charset="UTF-8">

    <link hred="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkblue: {
                            950: "#0a1727",
                            900: "#0d1b2a",
                            800: "#112240",
                            700: "#1b2c3f",
                        },
                        accent: {
                            green: "#2ed573",
                        },
                        status: {
                            finalised: "#2ed573",
                            offer: "#ffa502",
                            joined: "#70a1ff",
                            rejected: "#ff4757",
                        },
                        green: {
                            500: "#2ed573",
                            600: "#1c9f4e",
                            700: "#15803d",
                            800: "#166534",
                            900: "#14532d",
                        },
                        darkgreen: {
                            700: "#14532d",
                            800: "#166534",
                            900: "#15803d",
                            1000: "#1c9f4e",
                        }
                    },
                    boxShadow: {
                        glow: "0 0 15px rgba(46, 213, 115, 0.3)",
                        "glow-lg": "0 0 25px rgba(46, 213, 115, 0.4)",
                    },
                    keyframes: {
                        float: {
                            "0%, 100%": { transform: "translateY(0)" },
                            "50%": { transform: "translateY(-10px)" },
                        },
                        pulse: {
                            "0%, 100%": { opacity: 1 },
                            "50%": { opacity: 0.7 },
                        },
                        headerSlideDown: {
                            "0%": { transform: "translateY(-20px)", opacity: 0 },
                            "100%": { transform: "translateY(0)", opacity: 1 },
                        },
                        sidebarSlideIn: {
                            "0%": { transform: "translateX(-20px)", opacity: 0 },
                            "100%": { transform: "translateX(0)", opacity: 1 },
                        },
                        contentFadeIn: {
                            "0%": { opacity: 0 },
                            "100%": { opacity: 1 },
                        },
                        cardSlideUp: {
                            "0%": { transform: "translateY(20px)", opacity: 0 },
                            "100%": { transform: "translateY(0)", opacity: 1 },
                        },
                    },
                    animation: {
                        float: "float 3s ease-in-out infinite",
                        pulse: "pulse 2s ease-in-out infinite",
                        headerSlideDown: "headerSlideDown 0.5s ease-out forwards",
                        sidebarSlideIn: "sidebarSlideIn 0.5s ease-out forwards",
                        contentFadeIn: "contentFadeIn 0.8s ease-out forwards",
                        cardSlideUp: "cardSlideUp 0.5s ease-out forwards",
                    },
                },
            },
        };
    </script>
    <style>
        body {
            font-family: "Poppins", sans-serif;
            background-color: #0a1727;
        }

        .floating {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-20px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(46, 213, 115, 0.2);
            animation: particle-animation 15s infinite;
        }

        @keyframes particle-animation {
            0% {
                transform: translate(0, 0);
            }

            25% {
                transform: translate(100px, -50px);
            }

            50% {
                transform: translate(50px, 100px);
            }

            75% {
                transform: translate(-50px, 50px);
            }

            100% {
                transform: translate(0, 0);
            }
        }

        .glow {
            box-shadow: 0 0 15px rgba(46, 213, 115, 0.3);
        }

        .shield-icon {
            animation: shield-pulse 3s infinite;
        }

        @keyframes shield-pulse {
            0% {
                filter: drop-shadow(0 0 2px rgba(46, 213, 115, 0.4));
            }

            50% {
                filter: drop-shadow(0 0 8px rgba(46, 213, 115, 0.6));
            }

            100% {
                filter: drop-shadow(0 0 2px rgba(46, 213, 115, 0.4));
            }
        }


        .sidebar-item {
            transition: all 0.3s ease;
        }

        .sidebar-item:hover {
            background-color: rgba(46, 213, 115, 0.15);
            transform: translateX(5px);
        }

        .sidebar-item.active {
            background-color: rgba(46, 213, 115, 0.2);
            border-left: 3px solid #2ed573;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #2ed573;
            box-shadow: 0 0 0 1px #2ed573;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2ed573 0%, #10ac84 100%);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, 0.2),
                    transparent);
            transition: all 0.6s ease;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-primary:hover::after {
            left: 100%;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-secondary::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, 0.2),
                    transparent);
            transition: all 0.6s ease;
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-secondary:hover::after {
            left: 100%;
        }

        .skill-pill {
            transition: all 0.2s ease;
        }

        .skill-pill:hover {
            transform: translateY(-2px);
        }

        .skill-pill.active {
            background-color: #2ed573;
            color: #0d1b2a;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0a1727;
        }

        ::-webkit-scrollbar-thumb {
            background: #2ed573;
            border-radius: 4px;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .dashboard-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }

            .sidebar-content {
                flex-direction: row;
                overflow-x: auto;
                padding: 1rem;
            }

            .sidebar-item {
                border-left: none;
                border-bottom: 2px solid transparent;
                padding: 0.5rem 1rem;
                margin-right: 1rem;
            }

            .sidebar-item.active {
                border-left: none;
                border-bottom: 2px solid #2ed573;
            }

            .particle {
                position: absolute;
                border-radius: 50%;
                background: rgba(46, 213, 115, 0.1);
                pointer-events: none;
                z-index: 0;
            }

            .shield-pulse {
                animation: pulse 2s infinite;
            }

            .delay-100 {
                animation-delay: 0.1s;
            }

            .delay-200 {
                animation-delay: 0.2s;
            }

            .delay-300 {
                animation-delay: 0.3s;
            }

            .delay-400 {
                animation-delay: 0.4s;
            }

            .delay-500 {
                animation-delay: 0.5s;
            }



            @keyframes checkmark {
                0% {
                    transform: translate(-50%, -50%) scale(0);
                }

                50% {
                    transform: translate(-50%, -50%) scale(1.2);
                }

                100% {
                    transform: translate(-50%, -50%) scale(1);
                }
            }


            /* Profile dropdown animation */
            .profile-dropdown {
                transform: translateY(10px);
                opacity: 0;
                visibility: hidden;
                transition: all 0.3s ease;
            }

            .profile-dropdown.open {
                transform: translateY(0);
                opacity: 1;
                visibility: visible;
            }

            /* Notification animation */
            @keyframes slideIn {
                0% {
                    transform: translateX(100%);
                    opacity: 0;
                }

                100% {
                    transform: translateX(0);
                    opacity: 1;
                }
            }

            @keyframes slideOut {
                0% {
                    transform: translateX(0);
                    opacity: 1;
                }

                100% {
                    transform: translateX(100%);
                    opacity: 0;
                }
            }

            .notification {
                animation: slideIn 0.3s forwards;
            }

            .notification.hide {
                animation: slideOut 0.3s forwards;
            }
        }
    </style>
    <script src="../config/config.js"></script>
</head>

            </nav>

            <!-- User Profile -->
            <div class="absolute bottom-0 left-0 w-64 p-4 border-t border-gray-800 bg-gray-900">
                <div class="flex items-center">
                    <div
                        class="w-10 h-10 rounded-full bg-darkblue-700 flex items-center justify-center text-accent-green font-semibold">
                        MG
                    </div>
                    <div class="ml-3">
                        <p class="text-sm font-medium text-white">Mark Green</p>

                    </div>
                    <button id="logout" class="ml-4 text-gray-300 hover:text-white">

                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

        <!-- Main Content Area -->
        <div class="flex-1 min-h-screen ml-0 lg:ml-64 relative z-10">
            <!--Background Particles-->
            <div class="pointer-events-none absolute inset-0 z-0">
                <div class="particle w-15 h-16 top-[10%] left-[5%] animate-float delay-100 absolute"></div>
                <div class="particle w-20 h-20 top-[50%] left-[45%] animate-float delay-500 absolute"></div>
                <div class="particle w-23 h-23 top-[20%] left-[15%] animate-float delay-200 absolute"></div>
                <div class="particle w-32 h-32 top-[30%] left-[25%] animate-float delay-300 absolute"></div>
                <div class="particle w-24 h-24 top-[40%] left-[35%] animate-float delay-400 absolute"></div>

                    <div class="bg-[#112240] rounded-lg shadow-lg p-6 mb-8">

                                    <label for="jobCategory" class="block text-[#2ed573] mb-2 font-medium">Job

                                            <!-- Dynamic options go here -->
                                        </select>
                                        <span
                                            class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-4">
                                            <svg class="h-5 w-5 text-[#9ca3af]" fill="none" stroke="currentColor"

                                                    d="M19 9l-7 7-7-7" />
                                            </svg>
                                        </span>
                                    </div>
                                </div>

                                    <label for="experience" class="block text-[#2ed573] mb-2 font-medium">Experience

                                    <div class="relative">

                                            <option value="1-3">1-3 Years</option>

                                                    d="M19 9l-7 7-7-7" />
                                            </svg>
                                        </span>
                                    </div>
                                </div>

                                <!-- Education -->

                                            class="btn px-3 py-1.5 text-sm border border-gray-500 text-white rounded-md hover:bg-[#2ed573]">ID</button>
                                        <button id="sort-by-recent"
                                            class="btn px-3 py-1.5 text-sm border border-gray-500 text-white rounded-md hover:bg-[#2ed573]">Recent</button>
                                    </div>
                                </div>
                            </div>

                            <!-- Job Listings -->
                            <div class="bg-[#0d1b2a] p-4 rounded-md mb-6 hover:bg-darkgreen-900">
                                <ul id="jobList" class="text-white">
                                    <!-- Sample card or fallback -->
                                    <li class="p-4 bg-[#112233] rounded-md shadow">
                                        <h3 class="text-lg font-semibold text-[#2ed573]">No job posts yet.</h3>
                                        <p class="text-sm text-gray-400 italic">Please check back later.</p>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="logoutMessage" style="display:none; color: green; margin-top: 10px;"></div>
            </div>
        </div>
        <div id="error-dialog" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.3);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:#fff;padding:24px 32px;border-radius:8px;box-shadow:0 2px 16px rgba(0,0,0,0.2);min-width:300px;max-width:90vw;text-align:center;position:relative;">
    <span id="error-dialog-message" style="color:#b91c1c;font-size:1.1em;"></span>
    <br><br>
    <button onclick="closeErrorDialog()" style="background:#b91c1c;color:#fff;padding:8px 20px;border:none;border-radius:4px;cursor:pointer;">OK</button>
  </div>
</div>
<script>
function showError(message) {
  var dialog = document.getElementById('error-dialog');
  var msgSpan = document.getElementById('error-dialog-message');
  if (dialog && msgSpan) {
    msgSpan.textContent = message;
    dialog.style.display = 'flex';
  }
}
function closeErrorDialog() {
  var dialog = document.getElementById('error-dialog');
  if (dialog) dialog.style.display = 'none';
}
</script>
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                // ─── Element references ─────────────────────────────────────────────
                const sidebarToggle = document.getElementById('sidebar-toggle');
                const closeSidebar = document.getElementById('close-sidebar');
                const mobileSidebar = document.getElementById('mobile-sidebar');
                const jobCategory = document.getElementById('jobCategory');
                const technicalSkills = document.getElementById('technicalSkills');
                const softSkills = document.getElementById('softSkills');
                const educationSelect = document.getElementById('education');
                const jobForm = document.getElementById('jobForm');
                const resetButton = document.querySelector('button[type="reset"]');
                const jobList = document.getElementById('jobList');
                const myJobsButton = document.getElementById('my-jobs-btn');
                const allJobsButton = document.getElementById('all-jobs-btn');
                const searchInput = document.getElementById('search-jobs');
                const sortByIDButton = document.getElementById('sort-by-id');
                const sortByRecentButton = document.getElementById('sort-by-recent');

                // ─── Event listeners ────────────────────────────────────────────────
                document.getElementById("logout").addEventListener("click", async function () {
                    try {
                        const response = await fetch(`${apiConfig.getURL('api/logout/')}`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            credentials: 'include'
                        });

                        const data = await response.json();
                        const messageDiv = document.getElementById("logoutMessage");

                        if (response.ok) {
                            messageDiv.textContent = data.message;
                            messageDiv.style.display = 'block';

                            setTimeout(() => {
                                window.location.href = data.redirect;
                            }, 1500); // Delay to show message before redirect
                        } else {
                            messageDiv.textContent = "Logout failed.";
                            messageDiv.style.display = 'block';
                            messageDiv.style.color = 'red';
                        }
                    } catch (error) {
                        const messageDiv = document.getElementById("logoutMessage");
                        messageDiv.textContent = "An error occurred.";
                        messageDiv.style.display = 'block';
                        messageDiv.style.color = 'red';
                        console.error("Error during logout:", error);
                    }
                });

                // ─── Utility functions ─────────────────────────────────────────────
                function createSkillPill(skill) {
                    const pill = document.createElement('div');
                    pill.className = 'skill-pill cursor-pointer px-4 py-2 rounded-full border border-[#2ed573] text-[#9ca3af] text-sm transition-all';
                    pill.textContent = skill;
                    pill.dataset.selected = 'false';
                    pill.addEventListener('click', () => {
                        const isSelected = pill.dataset.selected === 'true';
                        pill.dataset.selected = isSelected ? 'false' : 'true';
                        pill.classList.toggle('active', !isSelected);
                    });
                    return pill;
                }

                async function renderRecentJobs() {
                    jobList.innerHTML = '<li class="italic text-[#9ca3af] animate-pulse">Loading...</li>';
                    try {
                        const res = await fetch(`${apiConfig.getURL('api/get-recent-jobs/?limit=5')}`);
                        const data = await res.json();
                        const jobs = data.jobs || [];
                        if (!jobs.length) {
                            jobList.innerHTML = '<li class="italic text-[#9ca3af]">No job posts yet.</li>';
                            return;
                        }
                        jobList.innerHTML = '';
                        jobs.forEach(job => {
                            const li = document.createElement('li');
                            li.className = 'bg-darkblue-900 p-4 rounded-lg shadow hover:bg-green-900 transition-all';
                            li.innerHTML = `
          <h3 class="text-lg font-semibold text-[#2ed573]">${job.position}</h3>
          <div><strong>Experience:</strong> ${job.experience}</div>
          <div><strong>Created By:</strong> ${job.created_by}</div>
          <div><strong>Posted On:</strong> ${new Date(job.created_at).toLocaleString()}</div>
        `;
                            jobList.appendChild(li);
                        });
                    } catch (err) {
                        console.error('Failed to fetch recent jobs:', err);
                        jobList.innerHTML = '<li class="italic text-red-400">Unable to load recent jobs.</li>';
                    }
                }

                // ─── Sidebar toggle logic ────────────────────────────────────────────
                if (sidebarToggle && closeSidebar && mobileSidebar) {
                    mobileSidebar.classList.add('hidden');
                    sidebarToggle.addEventListener('click', () => {
                        mobileSidebar.classList.toggle('hidden');
                    });
                    closeSidebar.addEventListener('click', () => {
                        mobileSidebar.classList.add('hidden');
                    });
                }

                // ─── Initial data loads ─────────────────────────────────────────────
                renderRecentJobs();

                (async function fetchPositions() {
                    try {
                        const res = await fetch(`${apiConfig.getURL('api/get_positions/')}`);
                        const data = await res.json();
                        if (!res.ok) throw new Error(data.error || 'Failed to load positions');
                        jobCategory.innerHTML = `<option value="" disabled selected>Select category</option>`;
                        data.forEach(position => {
                            const option = document.createElement('option');
                            option.value = position;
                            option.textContent = position;
                            jobCategory.appendChild(option);
                        });

                    } catch (err) {
                        console.error(err);
                    }
                })();

                // ─── Event listeners ───────────────────────────────────────────────
                if (jobCategory) {
                    jobCategory.addEventListener('change', async () => {
                        const position = jobCategory.value;
                        if (!position) return;
                        try {
                            await fetch(`${apiConfig.getURL('api/check_session/')}`, {
                                method: 'GET', credentials: 'include'
                            });
                            const res = await fetch(`${apiConfig.getURL('api/get_recommendations_for_position/')}`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ position })
                            });
                            const result = await res.json();
                            if (!res.ok) throw new Error(result.error);

                            // Clear old
                            technicalSkills.innerHTML = '';
                            softSkills.innerHTML = '';
                            educationSelect.innerHTML = '';

                            // Populate new
                            result.technical_skills.forEach(skill => technicalSkills.appendChild(createSkillPill(skill)));
                            result.soft_skills.forEach(skill => softSkills.appendChild(createSkillPill(skill)));
                            result.education.forEach((edu, i) => {
                                const opt = document.createElement('option');
                                opt.value = edu.toLowerCase().replace(/\s+/g, '-');
                                opt.textContent = edu;
                                if (i === 0) opt.selected = true;
                                educationSelect.appendChild(opt);
                            });
                        } catch (err) {
                            console.error('Failed to fetch recommendations:', err);
                        }
                    });
                }

                if (jobForm) {
                    jobForm.addEventListener('submit', async e => {
                        e.preventDefault();
                        const selectedTech = Array.from(technicalSkills.querySelectorAll('[data-selected="true"]'))
                            .map(p => p.textContent);
                        const selectedSoft = Array.from(softSkills.querySelectorAll('[data-selected="true"]'))
                            .map(p => p.textContent);
                        const payload = {
                            position: jobCategory.value,
                            experience: document.getElementById('experience').value,
                            education: [educationSelect.value],
                            technical_skills: selectedTech,
                            soft_skills: selectedSoft
                        };
                        try {
                            const res = await fetch(`${apiConfig.getURL('api/submit_job/')}`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                credentials: 'include',
                                body: JSON.stringify(payload)
                            });
                            const result = await res.json();
                            if (res.ok) {
                                showError('Job post sent to HR!');
                                jobForm.reset();
                            } else {
                                showError('Submission failed: ' + result.error);
                            }
                        } catch (err) {
                            console.error('Submission error:', err);
                        }
                    });

                    if (resetButton) {
                        resetButton.addEventListener('click', () => {
                            technicalSkills.innerHTML = '<p class="text-[#9ca3af] italic">Select a job category to see relevant skills</p>';
                            softSkills.innerHTML = '<p class="text-[#9ca3af] italic">Select a job category to see relevant skills</p>';
                        });
                    }
                }
            });
        </script>
</body>

</html>

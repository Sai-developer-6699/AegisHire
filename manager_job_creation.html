    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkblue: {
                            950: "#0a1727",
                            900: "#0d1b2a",
                            800: "#112240",
                            700: "#1b2c3f",
                        },
                        accent: {
                            green: "#2ed573",
                        },
                    },
                    boxShadow: {
                        glow: "0 0 15px rgba(46, 213, 115, 0.3)",
                        "glow-lg": "0 0 25px rgba(46, 213, 115, 0.4)",
                    },
                    keyframes: {
                        float: {
                            "0%, 100%": { transform: "translateY(0)" },
                            "50%": { transform: "translateY(-10px)" },
                        },
                        pulse: {
                            "0%, 100%": { opacity: 1 },
                            "50%": { opacity: 0.7 },
                        },
                        headerSlideDown: {
                            "0%": { transform: "translateY(-20px)", opacity: 0 },
                            "100%": { transform: "translateY(0)", opacity: 1 },

                        sidebarSlideIn: {
                            "0%": { transform: "translateX(-20px)", opacity: 0 },
                            "100%": { transform: "translateX(0)", opacity: 1 },
                        },
                        contentFadeIn: {
                            "0%": { opacity: 0 },
                            "100%": { opacity: 1 },
                        },
                        cardSlideUp: {
                            "0%": { transform: "translateY(20px)", opacity: 0 },
                            "100%": { transform: "translateY(0)", opacity: 1 },
                        },
                    },
                    animation: {
                        float: "float 3s ease-in-out infinite",
                        pulse: "pulse 2s ease-in-out infinite",
                        headerSlideDown: "headerSlideDown 0.5s ease-out forwards",
                        sidebarSlideIn: "sidebarSlideIn 0.5s ease-out forwards",
                        contentFadeIn: "contentFadeIn 0.8s ease-out forwards",
                        cardSlideUp: "cardSlideUp 0.5s ease-out forwards",

                },
            },
        };

    <style>
        body {
            font-family: "Poppins", sans-serif;
            background-color: #0a1727;
        }

        .floating {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-20px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(46, 213, 115, 0.2);
            animation: particle-animation 15s infinite;
        }

        @keyframes particle-animation {
            0% {
                transform: translate(0, 0);
            }

            25% {
                transform: translate(100px, -50px);
            }

            50% {
                transform: translate(50px, 100px);
            }

            75% {
                transform: translate(-50px, 50px);
            }

            100% {
                transform: translate(0, 0);
            }
        }

        .glow {
            box-shadow: 0 0 15px rgba(46, 213, 115, 0.3);
        }

        .shield-icon {
            animation: shield-pulse 3s infinite;
        }

        @keyframes shield-pulse {
            0% {
                filter: drop-shadow(0 0 2px rgba(46, 213, 115, 0.4));
            }

            50% {
                filter: drop-shadow(0 0 8px rgba(46, 213, 115, 0.6));
            }

            100% {
                filter: drop-shadow(0 0 2px rgba(46, 213, 115, 0.4));
            }
        }


        .sidebar-item {
            transition: all 0.3s ease;
        }

        .sidebar-item:hover {
            background-color: rgba(46, 213, 115, 0.15);
            transform: translateX(5px);
        }

        .sidebar-item.active {
            background-color: rgba(46, 213, 115, 0.2);
            border-left: 3px solid #2ed573;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #2ed573;
            box-shadow: 0 0 0 1px #2ed573;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2ed573 0%, #10ac84 100%);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, 0.2),
                    transparent);
            transition: all 0.6s ease;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-primary:hover::after {
            left: 100%;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-secondary::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, 0.2),
                    transparent);
            transition: all 0.6s ease;
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-secondary:hover::after {
            left: 100%;
        }

        .skill-pill {
            transition: all 0.2s ease;
        }

        .skill-pill:hover {
            transform: translateY(-2px);
        }

        .skill-pill.active {
            background-color: #2ed573;
            color: #0d1b2a;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0a1727;
        }

        ::-webkit-scrollbar-thumb {
            background: #2ed573;
            border-radius: 4px;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .dashboard-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }

            .sidebar-content {
                flex-direction: row;
                overflow-x: auto;
                padding: 1rem;
            }

            .sidebar-item {
                border-left: none;
                border-bottom: 2px solid transparent;
                padding: 0.5rem 1rem;
                margin-right: 1rem;
            }

            .sidebar-item.active {
                border-left: none;
                border-bottom: 2px solid #2ed573;
            }

            .particle {
                position: absolute;
                border-radius: 50%;
                background: rgba(46, 213, 115, 0.1);
                pointer-events: none;
                z-index: 0;
            }

            .shield-pulse {
                animation: pulse 2s infinite;
            }

            .delay-100 {
                animation-delay: 0.1s;
            }

            .delay-200 {
                animation-delay: 0.2s;
            }

            .delay-300 {
                animation-delay: 0.3s;
            }

            .delay-400 {
                animation-delay: 0.4s;
            }

            .delay-500 {
                animation-delay: 0.5s;
            }



            @keyframes checkmark {
                0% {
                    transform: translate(-50%, -50%) scale(0);
                }

                50% {
                    transform: translate(-50%, -50%) scale(1.2);
                }

                100% {
                    transform: translate(-50%, -50%) scale(1);
                }
            }


            /* Profile dropdown animation */
            .profile-dropdown {
                transform: translateY(10px);
                opacity: 0;
                visibility: hidden;
                transition: all 0.3s ease;
            }

            .profile-dropdown.open {
                transform: translateY(0);
                opacity: 1;
                visibility: visible;
            }

            /* Notification animation */
            @keyframes slideIn {
                0% {
                    transform: translateX(100%);
                    opacity: 0;
                }

                100% {
                    transform: translateX(0);
                    opacity: 1;
                }
            }

            @keyframes slideOut {
                0% {
                    transform: translateX(0);
                    opacity: 1;
                }

                100% {
                    transform: translateX(100%);
                    opacity: 0;
                }
            }

            .notification {
                animation: slideIn 0.3s forwards;
            }

            .notification.hide {
                animation: slideOut 0.3s forwards;
            }
        }
    </style>
</head>

        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const sidebarToggle = document.getElementById('sidebar-toggle');
                const closeSidebar = document.getElementById('close-sidebar');
                const mobileSidebar = document.getElementById('mobile-sidebar');

                if (sidebarToggle && closeSidebar && mobileSidebar) {
                    mobileSidebar.classList.add('hidden');
                    sidebarToggle.addEventListener('click', () => {
                        mobileSidebar.classList.toggle('hidden');
                    });
                    closeSidebar.addEventListener('click', () => {
                        mobileSidebar.classList.add('hidden');
                    });
                }

                // Element references
                const jobCategory = document.getElementById('jobCategory');
                const technicalSkills = document.getElementById('technicalSkills');
                const softSkills = document.getElementById('softSkills');
                const jobForm = document.getElementById('jobForm');
        /**
         * Saves a job post to the local storage.
         *
         * @param {Object} job - The job object to be saved, containing job details such as category, experience, education, and skills.
         * 
         * The function retrieves the current list of job posts from local storage, adds the new job to the beginning of the list,
         * and updates the local storage with the modified list.
         */

        /*************  ✨ Windsurf Command ⭐  *************/
        /**
         * Saves a job post to the local storage.
         *
         * @param {Object} job - The job object to be saved, containing job details such as category, experience, education, and skills.
         *
         * Retrieves the current list of job posts from local storage, adds the new job to the beginning of the list, and updates the local storage with the modified list.
         */
        /*******  cb748d9d-4837-48f7-a658-c3291bde1607  *******/   
                function saveJobPost(job) {
                    const jobs = JSON.parse(localStorage.getItem('jobPosts')) || [];
                    jobs.unshift(job); // Add to beginning
                    localStorage.setItem('jobPosts', JSON.stringify(jobs));
                }

                async function renderRecentJobs() {
                    const jobList = document.getElementById('jobList');
                    jobList.innerHTML = '<li class="italic text-[#9ca3af]">Loading...</li>';

                    try {
                       const res = await fetch('http://127.0.0.1:8000/api/get-recent-jobs/?limit=5');  // Optionally add user_id if needed
                        const data = await res.json();

                        const jobs = data.jobs || [];
                        jobList.innerHTML = '';

                        if (!jobs.length) {
                            jobList.innerHTML = '<li class="italic text-[#9ca3af]">No job posts yet.</li>';
                            return;
                        }

                        jobs.forEach((job, index) => {
                            const li = document.createElement('li');
                            li.className = 'bg-darkblue-800 p-4 rounded shadow border border-darkblue-700';
                            li.innerHTML = `
                                <div class="text-accent-green font-semibold mb-1">${index + 1}. ${job.position} Job</div>
                                <div><strong>Experience:</strong> ${job.experience}</div>
                                <div><strong>Created By:</strong> ${job.created_by}</div>
                                <div><strong>Posted On:</strong> ${new Date(job.created_at).toLocaleString()}</div>
                            `;
                            jobList.appendChild(li);
                        });
                    } catch (err) {
                        console.error('Failed to fetch recent jobs:', err);
                        jobList.innerHTML = '<li class="italic text-red-400">Unable to load recent jobs.</li>';
                    }
                }

                const resetButton = document.querySelector('button[type="reset"]');

                function createSkillPill(skill) {
                    const pill = document.createElement('div');
                    pill.className = 'skill-pill cursor-pointer px-4 py-2 rounded-full border border-[#2ed573] text-[#9ca3af] text-sm transition-all';
                    pill.textContent = skill;
                    pill.dataset.selected = 'false';

                    pill.addEventListener('click', () => {
                        const selected = pill.dataset.selected === 'true';
                        pill.dataset.selected = selected ? 'false' : 'true';
                        pill.classList.toggle('active', !selected);
                    });

                    return pill;
                }

                if (jobCategory) {
                    jobCategory.addEventListener('change', async () => {
                        const position = jobCategory.value;

                        if (!position) return;

                        try {
                            const response = await fetch('http://127.0.0.1:8000/api/get_recommendations_for_position/', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                },
                                body: JSON.stringify({ position })
                            });

                            const result = await response.json();

                            if (!response.ok) {
                                console.error(result.error);
                                return;
                            }

                            // Clear old pills
                            technicalSkills.innerHTML = '';
                            softSkills.innerHTML = '';
                            education.innerHTML = '';

                            // Create skill pills from API
                            result.technical_skills.forEach(skill => {
                                const pill = createSkillPill(skill);
                                technicalSkills.appendChild(pill);
                            });

                            result.soft_skills.forEach(skill => {
                                const pill = createSkillPill(skill);
                                softSkills.appendChild(pill);
                            });

                            // Populate education dropdown
                            result.education.forEach((edu, i) => {
                                const option = document.createElement('option');
                                option.value = edu.toLowerCase().replace(/\s+/g, '-');
                                option.textContent = edu;
                                if (i === 0) option.selected = true;
                                education.appendChild(option);
                            });

                        } catch (err) {
                            console.error('Failed to fetch recommendations:', err);
                        }
                    });
                }

                if (jobForm) {
                    jobForm.addEventListener('submit', async (e) => {
                    e.preventDefault();

                    const selectedTechnicalSkills = Array.from(technicalSkills.querySelectorAll('.skill-pill[data-selected="true"]')).map(p => p.textContent);
                    const selectedSoftSkills = Array.from(softSkills.querySelectorAll('.skill-pill[data-selected="true"]')).map(p => p.textContent);

                    const jobData = {
                        category: jobCategory.value,
                        experience: document.getElementById('experience').value,
                        education: document.getElementById('education').value,
                        technical_skills: selectedTechnicalSkills,
                        soft_skills: selectedSoftSkills
                    };

                    try {
                        const response = await fetch('http://127.0.0.1:8000/api/submit_job/', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify(jobData)
                        });

                        const result = await response.json();
                        if (response.ok) {
                            alert('Job post sent to HR!');
                            jobForm.reset();
                            // Optionally clear skill pills
                        } else {
                            alert('Submission failed: ' + result.error);
                        }
                    } catch (err) {
                        console.error('Failed to fetch recommendations:', err);
                    }
                });

                if (resetButton) {
                    resetButton.addEventListener('click', () => {
                        technicalSkills.innerHTML = '<p class="text-[#9ca3af] italic">Select a job category to see relevant skills</p>';
                        softSkills.innerHTML = '<p class="text-[#9ca3af] italic">Select a job category to see relevant skills</p>';
                    });
                }
                renderRecentJobs(); // Show existing posts when page loads

            }
        }); // <-- Add this closing brace and parenthesis for DOMContentLoaded
        </script>
</body>
</html>
